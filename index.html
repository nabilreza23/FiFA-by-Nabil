<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <script>

        gtag('config', 'G-VTNHF7TQMV');

    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.css" type="text/css" />

    <style>
        /* Cyberpunk Ultra Dark Green Global Styles */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #010703;
            overflow-x: hidden;
            font-family: 'Hind Siliguri', 'Inter', sans-serif;
            color: #e2f7e7;
        }

        /* Layout Grid mimicking YouTube Mobile App but Cyber Style */
        .app-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
        }

        /* Video Player Area (Top of Mobile View) */
        .player-section {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            box-shadow: 0 4px 30px rgba(0, 255, 102, 0.25);
            border-bottom: 2px solid #00ff66;
        }

        #vjs-wrapper, #fluid-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        #fluid-wrapper {
            display: none;
            background: #000;
            z-index: 1;
        }

        #vjs-wrapper {
            z-index: 2;
        }

        .fluid_video_wrapper {
            width: 100% !important;
            height: 100% !important;
        }

        .video-js {
            width: 100% !important;
            height: 100% !important;
            background-color: transparent;
        }

        /* REMOVE BIG PLAY BUTTON PERMANENTLY */
        .video-js .vjs-big-play-button {
            display: none !important;
        }

        /* Scrollable Content Area below Video (YouTube Style) */
        .content-section {
            flex: 1;
            overflow-y: auto;
            padding: 18px;
            box-sizing: border-box;
            background: linear-gradient(to bottom, #010703, #031409);
        }

        /* Video Details Block */
        .video-title {
            font-size: 19px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 6px;
            text-shadow: 0 0 15px rgba(0, 255, 102, 0.4);
            line-height: 1.4;
        }

        /* VideoJS Custom Control Bar (Sleek Neon Override) */
        .video-js .vjs-control-bar {
            background: rgba(1, 7, 3, 0.85) !important;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 102, 0.25);
            border-radius: 14px !important;
            bottom: 10px !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            width: calc(100% - 20px) !important;
            height: 48px !important;
            display: flex !important;
            align-items: center !important;
            padding: 0 10px !important;
            box-shadow: 0 0 20px rgba(0, 255, 102, .25);
            transition: opacity .4s ease, transform .4s ease;
        }

        .video-js .vjs-button {
            width: 38px !important;
            height: 38px !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            border-radius: 50% !important;
            margin: 0 3px !important;
            transition: all .2s ease;
            background: 0 0 !important;
            color: #00ff66 !important;
        }

        .video-js .vjs-button:hover {
            background: rgba(0, 255, 102, 0.2) !important;
            text-shadow: 0 0 10px #00ff66;
        }

        .video-js .vjs-icon-placeholder:before {
            font-size: 1.45em !important;
            line-height: 1 !important;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-js .vjs-volume-panel {
            display: flex !important;
            align-items: center !important;
            width: auto !important;
        }

        .video-js .vjs-volume-panel .vjs-volume-control {
            display: flex !important;
            align-items: center !important;
            height: 100% !important;
        }

        .video-js .vjs-picture-in-picture-control {
            margin-left: auto !important;
        }

        /* Video.js internal live hiding */
        .video-js .vjs-live-control,
        .video-js .vjs-live-display {
            display: none !important;
        }

        .vjs-current-time,
        .vjs-duration,
        .vjs-remaining-time,
        .vjs-time-divider {
            display: none !important;
        }

        /* SLEEK PROGRESS BAR - Glowing Cyber Green */
        .video-js .vjs-progress-control {
            display: flex !important;
            flex: auto;
            align-items: center;
            margin: 0 8px;
        }

        .video-js .vjs-progress-holder {
            height: 4px;
            border-radius: 2px;
            background: rgba(0, 255, 102, 0.15);
        }

        .video-js .vjs-play-progress {
            background-color: #00ff66;
            border-radius: 2px;
            box-shadow: 0 0 10px #00ff66;
        }

        .video-js .vjs-play-progress:before {
            font-size: 11px;
            top: -3px;
            color: #00ff66;
            text-shadow: 0 0 6px #00ff66;
        }

        .video-js .vjs-load-progress {
            background: rgba(255, 255, 255, 0.05) !important;
            border-radius: 2px;
        }

        .video-js .vjs-load-progress div {
            background: rgba(255, 255, 255, 0.07) !important;
            border-radius: 2px;
        }

        /* Real 1-Hour Stats UI Design */
        .meta-stats-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 12px 0 18px 0;
            font-size: 13.5px;
            color: #a3c2ab;
        }

        .global-live-badge {
            background: rgba(0, 255, 102, 0.12);
            border: 1px solid rgba(0, 255, 102, 0.4);
            border-radius: 5px;
            padding: 3px 9px;
            font-weight: 700;
            letter-spacing: .7px;
            color: #00ff66;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            text-shadow: 0 0 8px rgba(0, 255, 102, 0.6);
        }

        .global-live-badge::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: #00ff66;
            border-radius: 50%;
            margin-right: 6px;
            box-shadow: 0 0 10px #00ff66;
            animation: pulse-dot 1.5s infinite;
        }

        .vjs-view-counter {
            display: flex;
            align-items: center;
            color: #00ff66;
            font-weight: 600;
            text-shadow: 0 0 5px rgba(0, 255, 102, 0.2);
        }

        .vjs-view-counter svg {
            margin-right: 5px;
            fill: #00ff66;
        }

        @keyframes pulse-dot {
            0% { transform: scale(.95); box-shadow: 0 0 0 0 rgba(0, 255, 102, .7) }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(0, 255, 102, 0) }
            100% { transform: scale(.95); box-shadow: 0 0 0 0 rgba(0, 255, 102, 0) }
        }

        /* Fluid Player Custom UI Overrides */
        .fluid_controls_container {
            background: rgba(1, 7, 3, .85) !important;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 102, .25);
            border-radius: 14px !important;
            bottom: 10px !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            width: calc(100% - 20px) !important;
            height: 48px !important;
            box-shadow: 0 0 20px rgba(0, 255, 102, .25);
            padding: 0 5px
        }

        /* YouTube Channel Meta Block Custom Glow */
        .channel-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 0;
            border-top: 1px solid rgba(0, 255, 102, 0.15);
            border-bottom: 1px solid rgba(0, 255, 102, 0.15);
            margin-bottom: 22px;
        }

        .channel-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .channel-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #00ff66, #00220a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #fff;
            border: 1px solid #00ff66;
            box-shadow: 0 0 12px rgba(0, 255, 102, 0.5);
            font-size: 16px;
        }

        .channel-name {
            font-size: 15px;
            font-weight: 600;
            color: #fff;
        }

        .channel-subs {
            font-size: 12px;
            color: #a3c2ab;
        }

        /* UI Panels & Streaming Buttons */
        .social-box {
            display: flex;
            gap: 12px;
            margin-bottom: 22px;
            background: rgba(0, 255, 102, 0.02);
            padding: 14px;
            border-radius: 14px;
            border: 1px solid rgba(0, 255, 102, 0.12);
            box-shadow: inset 0 0 10px rgba(0, 255, 102, 0.05);
        }

        .social-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            border-radius: 24px;
            font-size: 13.5px;
            font-weight: 600;
            color: #fff;
            text-decoration: none;
            transition: .3s;
        }

        .btn-fb {
            background: rgba(24, 119, 242, 0.15);
            border: 1px solid rgba(24, 119, 242, 0.4);
            color: #6db0ff
        }

        .btn-fb:hover {
            background: #1877F2;
            color: #fff;
            box-shadow: 0 0 12px rgba(24, 119, 242, 0.4);
        }

        .btn-tg {
            background: rgba(0, 255, 102, 0.08);
            border: 1px solid rgba(0, 255, 102, 0.3);
            color: #00ff66
        }

        .btn-tg:hover {
            background: #00ff66;
            color: #010703;
            box-shadow: 0 0 15px #00ff66;
        }

        .server-section-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.7px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .server-section-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 14px;
            background: #00ff66;
            border-radius: 2px;
            box-shadow: 0 0 8px #00ff66;
        }

        .server-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .server-btn {
            background: rgba(0, 255, 102, 0.03);
            color: #a3c2ab;
            padding: 16px 20px;
            border-radius: 14px;
            font-size: 14.5px;
            font-weight: 600;
            cursor: pointer;
            transition: all .3s;
            border: 1px solid rgba(0, 255, 102, 0.15);
            position: relative;
            text-align: left;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.5);
        }

        .server-btn:hover {
            background: rgba(0, 255, 102, 0.08);
            color: #00ff66;
            border-color: #00ff66;
            box-shadow: 0 0 10px rgba(0, 255, 102, 0.15);
        }

        .server-btn.active {
            background: linear-gradient(135deg, #00220a, #004417);
            color: #00ff66;
            border-color: #00ff66;
            box-shadow: 0 0 20px rgba(0, 255, 42, .35), inset 0 0 10px rgba(0, 255, 102, 0.2);
            font-weight: 700
        }

        /* Badges Styling */
        .badge-hd::after {
            content: 'LIVE FHD';
            background: linear-gradient(90deg, #00ff66, #00aa44);
            color: #010703;
            font-size: 10px;
            font-weight: 800;
            padding: 3px 8px;
            border-radius: 5px;
            box-shadow: 0 0 8px #00ff66;
        }
    </style>
</head>

<body>
    <div class="app-container" onclick="attemptUnmute()">
        <div class="player-section">
            <div id="vjs-wrapper">
                <video id="live-player" class="video-js vjs-default-skin" controls autoplay muted playsinline preload="metadata">
                    <source src="" type="application/x-mpegURL">
                </video>
            </div>
            <div id="fluid-wrapper">
                <video id="fluid-player" controls autoplay muted playsinline></video>
            </div>
        </div>

        <div class="content-section">
            <div class="video-title">FIFA Live Stream FHD Presentation</div>
            
            <div class="meta-stats-row">
                <div class="global-live-badge">Live</div>
                <div class="vjs-view-counter" title="Total Views last hour">
                    <svg viewBox="0 0 24 24" width="15" height="15">
                        <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                    </svg>
                    <span id="liveViewerCount">548</span> views in last hour
                </div>
            </div>

            <div class="channel-row">
                <div class="channel-info">
                    <div class="channel-avatar">NR</div>
                    <div>
                        <div class="channel-name">4K Streaming</div>
                        <div class="channel-subs">Streamed by Nabil Reza</div>
                    </div>
                </div>
            </div>

            <div class="social-box" id="socialWidget">
                <a href="https://www.facebook.com/profile.php?id=61551121126388" target="_blank" class="social-btn btn-fb"> Follow FB </a>
                <a href="https://t.me/desperatecyberzone" target="_blank" class="social-btn btn-tg"> Join Telegram </a>
            </div>

            <div class="server-section-title">Select Transmission Node</div>
            <div class="server-box">
                <button id="btn-0" class="server-btn badge-hd active" onclick="changeServer(window.currentLiveUrl, 0)">
                    <span>Premium Cyber Node (Server 1)</span>
                </button>
            </div>
        </div>
    </div>

    <script defer src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script defer src="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.js"></script>

    <script defer>
        // Smart TV Auto-unlock
        const isTV = /SmartTV|Tizen|WebOS|BRAVIA|Android TV|AppleTV|Roku|TV/i.test(navigator.userAgent);
        if (isTV) {
            localStorage.setItem('isPremiumUnlocked', 'true');
        }

        // Anti-DevTools Protection System
        const nukePage = () => {
            document.body.innerHTML = '';
            document.body.style.backgroundColor = 'black';
            document.head.innerHTML = '';
        };
        
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (123 === e.keyCode || (e.ctrlKey && e.shiftKey && (73 === e.keyCode || 74 === e.keyCode || 67 === e.keyCode)) || (e.ctrlKey && 85 === e.keyCode)) {
                e.preventDefault();
                nukePage();
            }
        });

        setInterval(() => {
            const e = performance.now();
            debugger;
            if (performance.now() - e > 100) {
                nukePage();
            }
        }, 500);

        window.addEventListener('resize', () => {
            const e = window.outerWidth - window.innerWidth;
            const n = window.outerHeight - window.innerHeight;
            if (e > 160 || n > 160) {
                nukePage();
            }
        });

        const devtoolsDetector = new Image;
        Object.defineProperty(devtoolsDetector, 'id', {
            get: function () { nukePage(); }
        });
        console.log('%c', devtoolsDetector);

        // Player Configurations & Initializations
        var hlsFluid = null;
        var fluidPlayerInstance = null;
        var globalPlayerInstance = null;
        window.currentLiveUrl = "";

        function initFluidPlayer(url) {
            if (!fluidPlayerInstance) {
                fluidPlayerInstance = fluidPlayer('fluid-player', {
                    layoutControls: {
                        fillToContainer: true,
                        primaryColor: "#00ff66",
                        autoPlay: true,
                        mute: false,
                        controlBar: { autoHide: true }
                    }
                });
            }
            var videoEl = document.getElementById('fluid-player');
            if (Hls.isSupported()) {
                if (hlsFluid) hlsFluid.destroy();
                hlsFluid = new Hls({ maxBufferLength: 30 });
                hlsFluid.loadSource(url);
                hlsFluid.attachMedia(videoEl);
                hlsFluid.on(Hls.Events.MANIFEST_PARSED, function () {
                    videoEl.play().then(() => {
                        videoEl.muted = false;
                    }).catch(e => console.log(e));
                });
            } else if (videoEl.canPlayType('application/vnd.apple.mpegurl')) {
                videoEl.src = url;
                videoEl.play();
                videoEl.muted = false;
            }
        }

        function attemptUnmute() {
            if (globalPlayerInstance) {
                try { globalPlayerInstance.muted(false); } catch (e) {}
            }
            var fplayer = document.getElementById('fluid-player');
            if (fplayer) {
                try { fplayer.muted = false; } catch (e) {}
            }
        }

        // Multi-Proxy Dynamic Live Source Engine
        function getSecureStream() {
            const gateways = [
                "https://api.allorigins.win/raw?url=" + encodeURIComponent("https://all-live.pages.dev/toffee.m3u8?id=FIFA-2026"),
                "https://thingproxy.freeboard.io/fetch/https://all-live.pages.dev/toffee.m3u8?id=FIFA-2026",
                "https://all-live.pages.dev/toffee.m3u8?id=FIFA-2026"
            ];

            return new Promise((resolve) => {
                let index = 0;
                function tryFetch() {
                    if (index >= gateways.length) {
                        resolve("https://all-live.pages.dev/toffee.m3u8?id=FIFA-2026");
                        return;
                    }
                    fetch(gateways[index])
                        .then(res => {
                            if (res.ok) {
                                return res.text().then(text => {
                                    if (text.includes('.m3u8')) {
                                        resolve(gateways[index]);
                                    } else {
                                        throw new Error("Format error");
                                    }
                                });
                            }
                            throw new Error("Gateway failed");
                        })
                        .catch(() => {
                            index++;
                            tryFetch();
                        });
                }
                tryFetch();
            });
        }

        // Main Execution Block
        window.addEventListener('load', function () {
            var serverList = [];
            var currentServerIndex = 0, isSwitching = !1;
            
            var player = videojs('live-player', {
                html5: { vhs: { overrideNative: !0, allowCrossfileNaming: !0 } },
                muted: !1,
                autoplay: 'any',
                controlBar: { children: ['playToggle', 'volumePanel', 'progressControl', 'fullscreenToggle'] }
            });
            globalPlayerInstance = player;

            getSecureStream().then(validUrl => {
                window.currentLiveUrl = validUrl;
                serverList.push(validUrl);
                player.src({ src: validUrl, type: 'application/x-mpegURL' });
                
                // লক রিমুভ করা হয়েছে, সরাসরি প্লে হবে
                player.play().then(() => {
                    player.muted(false);
                }).catch(e => console.log(e));
            });

            player.ready(function () {
                const t = document.getElementById('liveViewerCount');
                if (t) {
                    let baseViews = 42 + Math.floor(Math.random() * 15);
                    let pointViews = Math.floor(Math.random() * 9);
                    t.innerText = baseViews + "." + pointViews + "K";
                }
            });

            window.changeServer = function (e, n) {
                if (0 === n && 0 !== currentServerIndex) return void window.location.reload();
                if (n === currentServerIndex) return;
                currentServerIndex = n, isSwitching = !1;
                document.querySelectorAll('.server-btn').forEach(btn => btn.classList.remove('active'));
                var t = document.getElementById('btn-' + n);
                if (t) t.classList.add('active');
                if (n < 4) {
                    document.getElementById('fluid-wrapper').style.display = 'none';
                    document.getElementById('vjs-wrapper').style.display = 'block';
                    var fplayer = document.getElementById('fluid-player');
                    if (fplayer && fplayer.pause) fplayer.pause();
                    player.error(null);
                    player.pause();
                    player.src({ src: e, type: 'application/x-mpegURL' });
                    player.load();
                    player.play().then(function () {
                        player.muted(false);
                        isSwitching = !1;
                    }).catch(function (e) { setTimeout(function () { isSwitching = !1 }, 2500) });
                } else {
                    document.getElementById('vjs-wrapper').style.display = 'none';
                    document.getElementById('fluid-wrapper').style.display = 'block';
                    player.pause();
                    initFluidPlayer(e);
                    isSwitching = !1;
                }
            };

            player.on('error', function () {
                if (isSwitching) return;
                var e = currentServerIndex + 1;
                e < serverList.length && (isSwitching = !0, setTimeout(function () { changeServer(serverList[e], e) }, 3e3))
            });
        });
    </script>
</body>

</html>
