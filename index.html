        }).catch(function(error) {
            console.log("Autoplay blocked or failed: ", error);
            setTimeout(function() { isSwitching = false; }, 2500);
        });
    }

    player.on('error', function() {
        if (isSwitching) return; 
        var nextServerIndex = currentServerIndex + 1;
        if (nextServerIndex < serverList.length) {
            isSwitching = true;
            setTimeout(function() {
                changeServer(serverList[nextServerIndex], nextServerIndex);
            }, 3000);
        }
    });
</script>
