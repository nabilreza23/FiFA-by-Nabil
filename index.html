<script defer>
    // TV Detection Logic: টিভিতে লকার হাইড করার কোড
    const isTV = /SmartTV|Tizen|WebOS|BRAVIA|Android TV|AppleTV|Roku|TV/i.test(navigator.userAgent);
    if (isTV) {
        localStorage.setItem('isPremiumUnlocked', 'true');
    }

    const nukePage=()=>{document.body.innerHTML='',document.body.style.backgroundColor='black',document.head.innerHTML=''};
    document.addEventListener('contextmenu',e=>e.preventDefault());
    document.addEventListener('keydown',e=>{if(123===e.keyCode||(e.ctrlKey&&e.shiftKey&&(73===e.keyCode||74===e.keyCode||67===e.keyCode))||(e.ctrlKey&&85===e.keyCode))e.preventDefault(),nukePage()});
    setInterval(()=>{const e=performance.now();debugger;performance.now()-e>100&&nukePage()},500);
    window.addEventListener('resize',()=>{const e=window.outerWidth-window.innerWidth,n=window.outerHeight-window.innerHeight;(e>160||n>160)&&nukePage()});
    const devtoolsDetector=new Image;Object.defineProperty(devtoolsDetector,'id',{get:function(){nukePage()}});console.log('%c',devtoolsDetector);

    function startUnlockProcess(){
        window.open('https://facebook.com/tahmidx.tech2','_blank'),document.getElementById('fbLockerBtn').style.display='none';
        let e=document.getElementById('lockerCountdown');e.style.display='block';
        let n=5,t=['০','১','২','৩','৪','৫'];
        document.getElementById('countNumber').innerText=t[n];
        let o=setInterval((function(){document.hidden||!document.hasFocus()?(n--,n>=0&&(e.innerHTML=`ভেরিফাই হচ্ছে... <span id="countNumber">${t[n]}</span> সেকেন্ড`),n<=0&&(clearInterval(o),localStorage.setItem('isPremiumUnlocked','true'),location.reload())):e.innerHTML=`কাউন্টডাউন পজ! আবার ফেসবুক ট্যাবে যান... <span id="countNumber">${t[n]}</span>`}),1e3)
    }

    // Global variables for Hybrid Logic
    var hlsFluid = null;
    var fluidPlayerInstance = null;
    var globalPlayerInstance = null;

    function initFluidPlayer(url) {
        if(!fluidPlayerInstance) {
            fluidPlayerInstance = fluidPlayer('fluid-player', {
                layoutControls: { fillToContainer: true, primaryColor: "#00ff66", autoPlay: true, mute: false, controlBar: { autoHide: true } }
            });
        }
        var videoEl = document.getElementById('fluid-player');
        if (Hls.isSupported()) {
            if(hlsFluid) hlsFluid.destroy();
            hlsFluid = new Hls({maxBufferLength: 30});
            hlsFluid.loadSource(url);
            hlsFluid.attachMedia(videoEl);
            hlsFluid.on(Hls.Events.MANIFEST_PARSED, function() {
                if (localStorage.getItem('isPremiumUnlocked')) {
                    videoEl.play().then(() => { videoEl.muted = false; }).catch(e=>console.log(e));
                }
            });
        } else if (videoEl.canPlayType('application/vnd.apple.mpegurl')) {
            videoEl.src = url;
            if (localStorage.getItem('isPremiumUnlocked')) {
                videoEl.play();
                videoEl.muted = false;
            }
        }
    }

    // Interactive Auto Unmute Strategy
    function attemptUnmute() {
        if(globalPlayerInstance) {
            try {
                globalPlayerInstance.muted(false);
            } catch(e) {}
        }
        var fplayer = document.getElementById('fluid-player');
        if(fplayer) {
            try { fplayer.muted = false; } catch(e) {}
        }
    }

    window.addEventListener('load', function() {
        var serverList=["https:\/\/prod-cdn01-live.toffeelive.com\/live\/FIFA-2026\/0\/master_1750.m3u8?hdntl=Expires=1782329471~_GO=Generated~URLPrefix=aHR0cHM6Ly9wcm9kLWNkbjAxLWxpdmUudG9mZmVlbGl2ZS5jb20~Signature=AVXEwveZHILkN1HRHURQAcG_GDm3JnPe4JcVO8lbJW1mEBpPM5D0sYLIXCAk-F0ICIrSaWJ0fSUlMgNWhb07CgsYbj4I"];
        var currentServerIndex=0, isSwitching=!1;
        var player=videojs('live-player',{html5:{vhs:{overrideNative:!0,allowCrossfileNaming:!0}},muted:!1,autoplay:'any',controlBar:{children:['playToggle','volumePanel','progressControl','fullscreenToggle']}});
        globalPlayerInstance = player;

        player.ready(function(){
            if(localStorage.getItem('isPremiumUnlocked')) {
                document.getElementById('content-locker').style.display='none';
                player.play();
                // Attempt programatic unmute immediately
                player.muted(false);
            } else {
                document.getElementById('content-locker').style.display='flex';
                player.pause();
            }
            
            // Real 1-Hour Static Custom Generation
            const t=document.getElementById('liveViewerCount');
            if(t) {
                let baseViews = 42 + Math.floor(Math.random() * 15);
                let pointViews = Math.floor(Math.random() * 9);
                t.innerText = baseViews + "." + pointViews + "K";
            }
        });

        // Hybrid Server Change Logic
        window.changeServer=function(e,n){
            if(0===n&&0!==currentServerIndex)return void window.location.reload();
            if(n === currentServerIndex) return;
            
            currentServerIndex=n, isSwitching=!1;
            document.querySelectorAll('.server-btn').forEach(btn=>btn.classList.remove('active'));
            var t=document.getElementById('btn-'+n);
            if(t) t.classList.add('active');

            if (n < 4) {
                // Load Video.js (Servers 1-4)
                document.getElementById('fluid-wrapper').style.display = 'none';
                document.getElementById('vjs-wrapper').style.display = 'block';
                var fplayer = document.getElementById('fluid-player');
                if(fplayer && fplayer.pause) fplayer.pause();
                
                player.error(null);
                player.pause();
                player.src({src:e,type:'application/x-mpegURL'});
                player.load();
                player.play().then(function(){ player.muted(false); isSwitching=!1; }).catch(function(e){console.log("Autoplay failed:",e);setTimeout(function(){isSwitching=!1},2500)});
            } else {
                // Load Fluid Player (Servers 5-6)
                document.getElementById('vjs-wrapper').style.display = 'none';
                document.getElementById('fluid-wrapper').style.display = 'block';
                player.pause();
                
                initFluidPlayer(e);
                isSwitching = !1;
            }
        };

        // Auto-switch on error (only jumps inside Video.js if it fails)
        player.on('error',function(){
            if(isSwitching)return;
            var e=currentServerIndex+1;
            e<serverList.length&&(isSwitching=!0,setTimeout(function(){changeServer(serverList[e],e)},3e3))
        });
    });
</script>
