<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA FHD Premium by Nabil Reza</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff66;
            --primary-glow: rgba(0, 255, 102, 0.4);
            --bg-dark: #020a05;
            --card-bg: rgba(7, 26, 14, 0.4);
            --border-color: rgba(0, 255, 102, 0.15);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-dark); overflow-x: hidden;
            font-family: 'Plus Jakarta Sans', 'Hind Siliguri', sans-serif; color: #e2f7e7;
        }

        /* Top Premium Border Line */
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 3px;
            background: linear-gradient(90deg, #00521a, var(--primary), #00521a); z-index: 99999;
        }

        .app-container { display: flex; flex-direction: column; width: 100%; height: 100vh; }
        
        /* Video Player Area with Subtle Shadow */
        .player-section {
            position: relative; width: 100%; aspect-ratio: 16/9; background: #000;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8), 0 4px 20px rgba(0, 255, 102, 0.1);
            border-bottom: 1px solid var(--border-color);
        }
        #vjs-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; }
        .video-js { width: 100% !important; height: 100% !important; background-color: transparent; }
        .video-js .vjs-big-play-button { display: none !important; }
        
        /* Content Styling */
        .content-section { 
            flex: 1; overflow-y: auto; padding: 24px; box-sizing: border-box; 
            background: linear-gradient(180deg, rgba(2,10,5,1) 0%, rgba(1,4,2,1) 100%); 
        }
        
        .video-title { 
            font-size: 22px; font-weight: 800; color: #fff; margin-bottom: 8px; 
            letter-spacing: -0.5px; line-height: 1.3;
        }
        
        /* Glassmorphic Stats Row */
        .meta-stats-row { 
            display: flex; align-items: center; gap: 12px; margin: 14px 0 20px 0; font-size: 13.5px; 
        }
        .global-live-badge { 
            background: rgba(0, 255, 102, 0.1); border: 1px solid rgba(0, 255, 102, 0.4); 
            border-radius: 6px; padding: 4px 10px; font-weight: 700; color: var(--primary); 
            text-transform: uppercase; font-size: 11.5px; display: flex; align-items: center; 
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.15);
        }
        .global-live-badge::before { 
            content: ''; display: inline-block; width: 6px; height: 6px; background-color: var(--primary); 
            border-radius: 50%; margin-right: 6px; box-shadow: 0 0 8px var(--primary); animation: pulse-dot 1.8s infinite; 
        }
        .vjs-view-counter { 
            display: flex; align-items: center; color: #a3c2ab; font-weight: 500; 
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.05);
            padding: 4px 12px; border-radius: 6px;
        }
        .vjs-view-counter span { color: var(--primary); font-weight: 700; margin-right: 4px; margin-left: 4px;}
        .vjs-view-counter svg { fill: #a3c2ab; margin-right: 6px; }

        @keyframes pulse-dot { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
        
        /* Modernized VideoJS Control Bar */
        .video-js .vjs-control-bar {
            background: rgba(2, 10, 5, 0.75) !important; backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px !important; bottom: 14px !important; 
            left: 50% !important; transform: translateX(-50%) !important; width: calc(100% - 28px) !important; 
            height: 52px !important; display: flex !important; align-items: center !important; box-shadow: 0 20px 40px rgba(0,0,0,0.7);
        }
        .video-js .vjs-button { width: 40px !important; height: 40px !important; color: #fff !important; transition: all 0.3s ease; }
        .video-js .vjs-button:hover { color: var(--primary) !important; transform: scale(1.08); }
        .video-js .vjs-progress-control { display: flex !important; align-items: center; }
        .video-js .vjs-progress-holder { height: 5px; border-radius: 3px; background: rgba(255, 255, 255, 0.1); }
        .video-js .vjs-play-progress { background-color: var(--primary); border-radius: 3px; box-shadow: 0 0 12px var(--primary); }
        .video-js .vjs-load-progress { background: rgba(255, 255, 255, 0.05) !important; }
        .video-js .vjs-picture-in-picture-control { margin-left: auto !important; }
        .video-js .vjs-live-control, .video-js .vjs-live-display, .vjs-current-time, .vjs-duration, .vjs-remaining-time, .vjs-time-divider { display: none !important; }

        /* Premium Channel Section */
        .channel-row { 
            display: flex; align-items: center; padding: 16px; background: var(--card-bg);
            backdrop-filter: blur(10px); border: 1px solid var(--border-color); border-radius: 16px; margin-bottom: 20px; 
        }
        .channel-info { display: flex; align-items: center; gap: 14px; }
        .channel-avatar { 
            width: 44px; height: 44px; background: linear-gradient(135deg, var(--primary), #00330a); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-weight: 700; color: #fff; border: 1px solid var(--primary); box-shadow: 0 0 15px rgba(0, 255, 102, 0.2);
        }
        .channel-name { font-size: 16px; font-weight: 700; color: #fff; }
        .channel-subs { font-size: 12.5px; color: #a3c2ab; margin-top: 2px; }
        
        /* Elegant Social Box */
        .social-box { display: flex; gap: 14px; margin-bottom: 24px; }
        .social-btn { 
            flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 14px; 
            border-radius: 14px; font-size: 14px; font-weight: 700; color: #fff; text-decoration: none; transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .btn-fb { background: rgba(24, 119, 242, 0.1); border: 1px solid rgba(24, 119, 242, 0.3); color: #7cb4ff; }
        .btn-fb:hover { background: #1877F2; color: #fff; box-shadow: 0 8px 20px rgba(24, 119, 242, 0.3); transform: translateY(-2px); }
        .btn-tg { background: rgba(0, 255, 102, 0.05); border: 1px solid rgba(0, 255, 102, 0.25); color: var(--primary); }
        .btn-tg:hover { background: var(--primary); color: var(--bg-dark); box-shadow: 0 8px 25px rgba(0, 255, 102, 0.3); transform: translateY(-2px); }
        
        /* Ultra Luxury Node Selector */
        .server-section-title { 
            font-size: 13px; font-weight: 700; margin-bottom: 14px; color: #7aa385; 
            text-transform: uppercase; letter-spacing: 1.5px; display: flex; align-items: center; gap: 8px; 
        }
        .server-section-title::before { content: ''; display: inline-block; width: 3px; height: 12px; background: var(--primary); border-radius: 2px; }
        
        .server-btn { 
            background: linear-gradient(135deg, rgba(7, 36, 17, 0.6), rgba(2, 15, 6, 0.8)); 
            color: var(--primary); border: 1px solid var(--primary); padding: 18px 24px; border-radius: 16px; 
            font-size: 15px; font-weight: 800; width: 100%; text-align: left; display: flex; 
            align-items: center; justify-content: space-between; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255,255,255,0.05);
            transition: all 0.4s ease;
        }
        .server-btn:hover { box-shadow: 0 0 25px rgba(0, 255, 102, 0.3); transform: scale(1.01); }
        .badge-hd::after { 
            content: 'HQ STABLE'; background: linear-gradient(90deg, #00ff66, #00993d); color: #010703; 
            font-size: 10px; font-weight: 800; padding: 4px 10px; border-radius: 6px; letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="app-container" onclick="attemptUnmute()">
        <div class="player-section">
            <div id="vjs-wrapper">
                <video id="live-player" class="video-js vjs-default-skin" controls autoplay muted playsinline preload="metadata">
                    <source src="https://prod-cdn01-live.toffeelive.com/live/FIFA-2026/0/master_1750.m3u8?hdntl=Expires=1782500591~_GO=Generated~URLPrefix=aHR0cHM6Ly9wcm9kLWNkbjAxLWxpdmUudG9mZmVlbGl2ZS5jb20~Signature=AVXEwveDPqCGmAJInaCplSONLs5CGD2rxYKTVAXRw5gsV1tpPqAgGxxP2d32pMnXvA51ryFWTchzDvlMocr_bGuBfpEI" type="application/x-mpegURL">
                </video>
            </div>
        </div>

        <div class="content-section">
            <div class="video-title">FIFA Live Stream — Premium FHD Ultra</div>
            
            <div class="meta-stats-row">
                <div class="global-live-badge">Live Node</div>
                <div class="vjs-view-counter">
                    <svg viewBox="0 0 24 24" width="14" height="14"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                    <span id="liveViewerCount">54.8K</span> active streaming
                </div>
            </div>

            <div class="channel-row">
                <div class="channel-info">
                    <div class="channel-avatar">NR</div>
                    <div>
                        <div class="channel-name">Cyber Transmission 4K</div>
                        <div class="channel-subs">Optimized by Nabil Reza</div>
                    </div>
                </div>
            </div>

            <div class="social-box">
                <a href="https://www.facebook.com/profile.php?id=61551121126388" target="_blank" class="social-btn btn-fb">Follow Platform</a>
                <a href="https://t.me/desperatecyberzone" target="_blank" class="social-btn btn-tg">Join Telegram HQ</a>
            </div>

            <div class="server-section-title">Select Transmission Core</div>
            <div class="server-box">
                <button id="btn-0" class="server-btn badge-hd">
                    <span>Premium Cyber Node (Main Server)</span>
                </button>
            </div>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        var globalPlayerInstance = null;

        // Anti-DevTools Protection
        const nukePage = () => { document.body.innerHTML = ''; document.head.innerHTML = ''; };
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (123 === e.keyCode || (e.ctrlKey && e.shiftKey && (73 === e.keyCode || 74 === e.keyCode || 67 === e.keyCode)) || (e.ctrlKey && 85 === e.keyCode)) {
                e.preventDefault(); nukePage();
            }
        });
        setInterval(() => { const e = performance.now(); debugger; if (performance.now() - e > 100) nukePage(); }, 500);

        function attemptUnmute() {
            if (globalPlayerInstance) {
                try { globalPlayerInstance.muted(false); } catch (e) {}
            }
        }

        window.addEventListener('load', function () {
            var player = videojs('live-player', {
                html5: { vhs: { overrideNative: !0, allowCrossfileNaming: !0 } },
                muted: !0,
                autoplay: 'any',
                controlBar: { children: ['playToggle', 'volumePanel', 'progressControl', 'fullscreenToggle'] }
            });
            globalPlayerInstance = player;

            player.ready(function () {
                player.play().catch(e => console.log("Autoplay blocked:", e));
                const t = document.getElementById('liveViewerCount');
                if (t) {
                    let baseViews = 50 + Math.floor(Math.random() * 15);
                    let pointViews = Math.floor(Math.random() * 9);
                    t.innerText = baseViews + "." + pointViews + "K";
                }
            });
        });
    </script>
</body>
</html>
